<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하님 수업 관리</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f6f3; --bg3: #efede8;
    --text: #2c2c2a; --text2: #6b6a65; --text3: #9b9a94;
    --border: #e4e2db; --border2: #d0cec6;
    --accent: #1D9E75; --accent-dark: #0F6E56;
    --danger: #c0392b;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar h1 span { color: var(--text3); font-weight: 400; font-size: 13px; margin-left: 6px; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 7px 14px; border: 1px solid var(--border); background: var(--bg); border-radius: 99px; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; }
  .tab.active { background: var(--text); color: white; border-color: var(--text); }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }

  .cal-wrap { display: flex; gap: 14px; align-items: flex-start; }
  .cal { flex: 1; min-width: 0; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .cal-head .month { font-size: 16px; font-weight: 600; }
  .cal-head .nav { display: flex; gap: 4px; }
  .btn { padding: 5px 10px; border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text); font-family: inherit; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); width: 100%; padding: 10px; font-weight: 500; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-danger { color: var(--danger); border-color: transparent; padding: 5px 8px; }
  .dow { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
  .dow div { padding: 6px 0; text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); }
  .dow .sun { color: #d0021b; } .dow .sat { color: #1565c0; }
  .grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cell { min-height: 76px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px 3px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
  .cell:nth-child(7n) { border-right: none; }
  .cell.sel { background: var(--bg2); }
  .daynum { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: var(--text2); }
  .daynum.sun { color: #d0021b; } .daynum.sat { color: #1565c0; }
  .daynum.today { background: var(--accent); color: white; font-weight: 600; }
  .pill { border-radius: 3px; padding: 1px 5px; font-size: 10px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
  .pill .t { opacity: 0.65; }

  .panel { width: 340px; flex-shrink: 0; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .panel-head .title { font-size: 14px; font-weight: 600; }
  .close { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--text3); line-height: 1; }
  .panel-body { padding: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; }
  .chip { display: inline-flex; align-items: center; border-radius: 99px; padding: 3px 11px; font-size: 12px; font-weight: 500; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 14px; }
  .hint { text-align: center; padding: 28px 12px; color: var(--text3); font-size: 13px; }

  /* tags */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .tagbtn { padding: 4px 11px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); font-family: inherit; }
  .tagbtn.on { background: var(--accent); color: white; border-color: var(--accent); }
  .tag-static { display: inline-flex; padding: 2px 9px; border-radius: 99px; font-size: 11px; background: var(--bg3); color: var(--text2); }

  /* students manager */
  .stu-list { padding: 8px; }
  .stu-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .stu-row:last-child { border-bottom: none; }
  .stu-row.clickable { cursor: pointer; }
  .stu-row.clickable:hover { background: var(--bg2); }
  .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .stu-name { font-weight: 500; min-width: 90px; }
  .stu-book { flex: 1; }
  .stu-book select { font-size: 12px; padding: 5px 8px; }
  .stu-unit { width: 80px; flex-shrink: 0; }
  .stu-unit input { font-size: 12px; padding: 5px 8px; text-align: center; }
  .stu-count { font-size: 11px; color: var(--text3); margin-right: 4px; }
  .add-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); align-items: flex-end; }
  .add-row .field { margin: 0; flex: 1; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-item .swatch { width: 12px; height: 12px; }
  .row-actions { display: flex; gap: 6px; }

  /* record cards (student detail + review) */
  .rec { border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .rec-date { font-size: 12px; font-weight: 600; color: var(--accent-dark); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .rec-line { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .rec-line .ic { color: var(--text3); flex-shrink: 0; font-size: 12px; margin-top: 2px; }
  .rec-line .lab { font-size: 11px; color: var(--text3); display: block; }
  .back-btn { font-size: 13px; padding: 5px 12px; margin-bottom: 14px; }
  .filterbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .seg { display: flex; gap: 0; border: 1px solid var(--border2); border-radius: var(--radius); overflow: hidden; }
  .seg button { border: none; background: var(--bg); padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit; border-right: 1px solid var(--border); }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--text); color: white; }

  /* 추천 자료 섹션 */
  .rec-section { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .rec-section-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .rec-section-head .sec-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .rec-section-head .sec-badge { font-size: 11px; color: var(--text3); }
  .rec-section-body { padding: 10px 14px; }
  .rec-res-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .rec-res-row:last-child { border-bottom: none; }
  .rec-res-name { font-size: 13px; flex: 1; min-width: 0; }
  .rec-res-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .rec-res-tag { font-size: 10px; padding: 1px 7px; border-radius: 99px; background: var(--bg3); color: var(--text2); }
  .notion-badge { font-size: 10px; padding: 1px 7px; border-radius: 99px; background: #f0f0f0; color: #555; border: 1px solid #ddd; }

  @media (max-width: 760px) { .cal-wrap { flex-direction: column; } .panel { width: 100%; } .stu-unit { width: 60px; } }

function migrate() {
  if (!localStorage.getItem(LS_KEY)) {
    const old = localStorage.getItem("hanim_lessons_html_v1");
    if (old) {
      try {
        const arr = JSON.parse(old).map(l => ({ ...l, wentWell: l.wentWell||"", hard: l.hard||"", tags: l.tags||[] }));
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
      } catch {}
    }
  }
  if (!localStorage.getItem(ST_KEY)) {
    const old = localStorage.getItem("hanim_students_html_v1");
    if (old) localStorage.setItem(ST_KEY, old);
  }
}

// ─── GitHub API 로드 ──────────────────────────────────────────────────────────
async function loadResourcesFromGitHub() {
  try {
    const res = await fetch(GH_API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.tree || !Array.isArray(data.tree)) throw new Error('tree 없음');
    state.resources = data.tree
      .filter(item => item.type === 'blob' && item.path.endsWith('.html'))
      .map(item => ({
        file: item.path,
        name: item.path.split('/').pop().replace(/\.html$/i, '').replace(/[_-]/g, ' ').trim()
      }));
  } catch (e) {
    console.warn('[자료 라이브러리] GitHub API 호출 실패, fallback 사용:', e.message);
    state.resources = false;
  }
  if (state.tab === 'library') render();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(el(`
    <div class="topbar">
      <h1>하님 수업 관리 <span>${state.students.length}명</span></h1>
      <div class="tabs">
        <button class="tab ${state.tab==='calendar'?'active':''}" data-tab="calendar">캘린더</button>

        <button class="tab ${state.tab==='review'?'active':''}" data-tab="review">복습 모아보기</button>
        <button class="tab ${state.tab==='library'?'active':''}" data-tab="library">자료 라이브러리</button>
      </div>
    </div>`));
  app.querySelectorAll(".tab").forEach(b => b.onclick = () => { state.tab = b.dataset.tab; state.panel = null; state.studentDetail = null; state.resFilter = null; render(); });

  if (state.tab === "calendar") app.appendChild(renderCalendar());
  else if (state.tab === "students") app.appendChild(state.studentDetail ? renderStudentDetail() : renderStudents());
  else if (state.tab === "review") app.appendChild(renderReview());

}

// ─── 캘린더 ───────────────────────────────────────────────────────────────────
function renderCalendar() {
  const wrap = el(`<div class="cal-wrap"></div>`);
  const { y, m } = state.ym;
  const firstDay = new Date(y, m, 1).getDay();
  const dim = new Date(y, m+1, 0).getDate();
  const cells = Math.ceil((firstDay + dim) / 7) * 7;
  const cal = el(`<div class="card cal"></div>`);
  const head = el(`<div class="cal-head"><span class="month">${y}년 ${MONTHS[m]}</span><div class="nav"><button class="btn" id="today">오늘</button><button class="btn" id="prev">‹</button><button class="btn" id="next">›</button></div></div>`);
  cal.appendChild(head);
  head.querySelector("#today").onclick = () => { state.ym = { y:new Date().getFullYear(), m:new Date().getMonth() }; render(); };
  head.querySelector("#prev").onclick  = () => { state.ym = m===0?{y:y-1,m:11}:{y,m:m-1}; render(); };
  head.querySelector("#next").onclick  = () => { state.ym = m===11?{y:y+1,m:0}:{y,m:m+1}; render(); };
  cal.appendChild(el(`<div class="dow">${DAYS.map((d,i)=>`<div class="${i===0?'sun':i===6?'sat':''}">${d}</div>`).join("")}</div>`));
  const grid = el(`<div class="grid"></div>`);
  for (let i = 0; i < cells; i++) {
    const day = i - firstDay + 1;
    const valid = day >= 1 && day <= dim;
    const date = valid ? toStr(y, m, day) : null;
    const col = i % 7;
    const selDate = state.panel?.type === "new" && state.panel.date === date;
    const selLessonObj = state.panel?.type === "lesson" ? state.lessons.find(l => l.id === state.panel.id) : null;
    const cellSel = selDate || (selLessonObj && selLessonObj.date === date);
    const cell = el(`<div class="cell ${cellSel?'sel':''}"></div>`);
    if (valid) {
      const today = isToday(date);
      cell.appendChild(el(`<div class="daynum ${today?'today':col===0?'sun':col===6?'sat':''}">${day}</div>`));
      state.lessons.filter(l => l.date === date).forEach(l => {
        const c = bookById(studentBook(l.student));
        const isSelP = selLessonObj && selLessonObj.id === l.id;
        const pill = el(`<div class="pill" style="background:${c.bg};color:${c.text};${isSelP?`border-color:${c.border}`:''}">${l.time?`<span class="t">${l.time}</span> `:''}${l.student}</div>`);
        pill.onclick = (e) => { e.stopPropagation(); openLesson(l); };
        cell.appendChild(pill);
      });
      cell.onclick = () => openNew(date);
    }
    grid.appendChild(cell);
  }
  cal.appendChild(grid);
  wrap.appendChild(cal);
  if (state.panel) wrap.appendChild(renderPanel());
  return wrap;
}

// ─── 수업 패널 ────────────────────────────────────────────────────────────────
function renderPanel() {
  const panel = el(`<div class="card panel"></div>`);
  if (state.panel.type === "new") {
    const date = state.panel.date;
    panel.appendChild(el(`<div class="panel-head"><span class="title">${fmtDate(date)}</span><button class="close">&times;</button></div>`));
    const body = el(`<div class="panel-body"></div>`);
    body.appendChild(el(`<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px">수업 추가</div>`));
    body.appendChild(el(`<div class="field"><label>학생</label><select id="f-student">${state.students.map(s=>`<option>${s.name}</option>`).join("")}</select></div>`));
    body.appendChild(el(`<div class="field"><label>시간</label><input type="time" id="f-time"></div>`));
    body.appendChild(el(`<div class="field"><label>주제 (선택)</label><input type="text" id="f-topic" placeholder="예: 피동 표현, Unit 5..."></div>`));
    const addBtn = el(`<button class="btn btn-primary">수업 추가</button>`);
    body.appendChild(addBtn);
    panel.appendChild(body);
    panel.querySelector(".close").onclick = closePanel;
    addBtn.onclick = () => {
      const nl = { id: String(Date.now()), student: body.querySelector("#f-student").value, date, time: body.querySelector("#f-time").value, topic: body.querySelector("#f-topic").value, wentWell: "", hard: "", tags: [], notes: "" };
      state.lessons.push(nl); saveLessons(); openLesson(nl);
    };
  } else {
    const l = state.lessons.find(x => x.id === state.panel.id);
    if (!l) { closePanel(); return panel; }
    if (!l.tags) l.tags = [];
    const c = bookById(studentBook(l.student));
    const book = bookById(studentBook(l.student));
    panel.appendChild(el(`<div class="panel-head"><span class="title">${fmtDate(l.date)}</span><button class="close">&times;</button></div>`));
    const body = el(`<div class="panel-body"></div>`);
    body.appendChild(el(`<div class="meta-row"><span class="chip" style="background:${c.bg};color:${c.text}">${l.student}</span>${l.time?`<span style="font-size:12px;color:var(--text2)">${l.time}</span>`:''}<span style="font-size:11px;color:var(--text3)">${book.name}${l.topic?` · ${l.topic}`:''}</span></div>`));

    if (isPast(l.date)) {
      body.appendChild(el(`<div class="field"><label>잘한 점</label><textarea id="well" rows="2" placeholder="오늘 잘한 것...">${l.wentWell||""}</textarea></div>`));
      body.appendChild(el(`<div class="field"><label>어려워한 점</label><textarea id="hard" rows="2" placeholder="어려워한 것... (복습 모아보기에 쌓여요)">${l.hard||""}</textarea></div>`));
      const tagField = el(`<div class="field"><label>태그 (여러 개 선택 가능)</label></div>`);
      const tagRow = el(`<div class="tag-row"></div>`);
      TAGS.forEach(t => {
        const on = l.tags.includes(t);
        const tb = el(`<button class="tagbtn ${on?'on':''}">${t}</button>`);
        tb.onclick = () => { if (l.tags.includes(t)) l.tags = l.tags.filter(x=>x!==t); else l.tags.push(t); tb.classList.toggle("on"); };
        tagRow.appendChild(tb);
      });
      tagField.appendChild(tagRow);
      body.appendChild(tagField);

      const saveBtn = el(`<button class="btn btn-primary" style="margin-top:4px">저장</button>`);
      saveBtn.onclick = () => { l.wentWell = body.querySelector("#well").value; l.hard = body.querySelector("#hard").value; saveLessons(); saveBtn.textContent = "저장됐어요!"; setTimeout(()=>saveBtn.textContent="저장",1500); };
      body.appendChild(saveBtn);
    } else {
      body.appendChild(el(`<div class="hint">수업 당일이 되면 기록을 작성할 수 있어요</div>`));
    }
    const del = el(`<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)"><button class="btn btn-danger">수업 삭제</button></div>`);
    del.querySelector("button").onclick = () => { state.lessons = state.lessons.filter(x => x.id !== l.id); saveLessons(); closePanel(); };
    body.appendChild(del);
    panel.appendChild(body);
    panel.querySelector(".close").onclick = closePanel;
  }
  return panel;
}

// ─── 유틸 함수 ────────────────────────────────────────────────────────────────
function tagsHtml(tags) { return (tags&&tags.length)? `<div class="tag-row" style="margin-top:6px">${tags.map(t=>`<span class="tag-static">${t}</span>`).join("")}</div>` : ""; }

function recCard(l, showStudent) {
  const c = bookById(studentBook(l.student));
  const rec = el(`<div class="rec" style="border-left-color:${c.border}"></div>`);
  rec.appendChild(el(`<div class="rec-date"><span>${fmtDate(l.date)}${l.time?` · ${l.time}`:''}</span>${showStudent?`<span class="chip" style="background:${c.bg};color:${c.text}">${l.student}</span>`:''}</div>`));
  if (l.topic) rec.appendChild(el(`<div class="rec-line"><span style="font-size:12px;color:var(--text2)">📖 ${l.topic}</span></div>`));
  if (l.wentWell) rec.appendChild(el(`<div class="rec-line"><span class="ic">＋</span><div><span class="lab">잘한 점</span>${l.wentWell}</div></div>`));
  if (l.hard) rec.appendChild(el(`<div class="rec-line"><span class="ic">△</span><div><span class="lab">어려워한 점</span>${l.hard}</div></div>`));
  const th = tagsHtml(l.tags);
  if (th) rec.appendChild(el(th));
  return rec;
}

// ─── 학생 관리 ────────────────────────────────────────────────────────────────
function renderStudents() {
  const card = el(`<div class="card"></div>`);
  const list = el(`<div class="stu-list"></div>`);
  state.students.forEach((s, idx) => {
    const c = bookById(s.book);
    const count = state.lessons.filter(l => l.student === s.name).length;
    const row = el(`<div class="stu-row"></div>`);
    row.appendChild(el(`<div class="swatch" style="background:${c.bg};border:1.5px solid ${c.border}"></div>`));
    const nameEl = el(`<div class="stu-name clickable-name" style="cursor:pointer">${s.name}</div>`);
    nameEl.onclick = () => { state.studentDetail = s.name; state.detailMode = "all"; render(); };
    row.appendChild(nameEl);
    if (count>0) row.appendChild(el(`<span class="stu-count">${count}회</span>`));
    const bookCell = el(`<div class="stu-book"><select>${BOOKS.map(b=>`<option value="${b.id}" ${b.id===s.book?'selected':''}>${b.name}</option>`).join("")}</select></div>`);
    bookCell.querySelector("select").onchange = (e) => { state.students[idx].book = e.target.value; saveStudents(); render(); };
    row.appendChild(bookCell);
    // 단원 입력 칸
    const unitCell = el(`<div class="stu-unit"><input type="text" placeholder="단원" value="${s.unit||''}" title="현재 단원 (예: 5과, Unit 3)"></div>`);
    const unitInput = unitCell.querySelector("input");
    unitInput.onchange = () => { state.students[idx].unit = unitInput.value.trim(); saveStudents(); };
    row.appendChild(unitCell);
    const del = el(`<div class="row-actions"><button class="btn btn-danger">삭제</button></div>`);
    del.querySelector("button").onclick = () => { if (confirm(`${s.name} 학생을 삭제할까요? (수업 기록은 유지됩니다)`)) { state.students.splice(idx,1); saveStudents(); render(); } };
    row.appendChild(del);
    list.appendChild(row);
  });
  card.appendChild(list);
  const addRow = el(`<div class="add-row"><div class="field"><label>새 학생 이름</label><input type="text" id="new-name" placeholder="이름 입력"></div><div class="field"><label>교재</label><select id="new-book">${BOOKS.map(b=>`<option value="${b.id}">${b.name}</option>`).join("")}</select></div><button class="btn btn-primary" style="width:auto;flex:0 0 auto" id="add-stu">추가</button></div>`);
  addRow.querySelector("#add-stu").onclick = () => {
    const name = addRow.querySelector("#new-name").value.trim();
    const book = addRow.querySelector("#new-book").value;
    if (!name) return;
    if (state.students.some(s => s.name === name)) { alert("이미 있는 학생이에요"); return; }
    state.students.push({ name, book, unit: "" }); saveStudents(); render();
  };
  card.appendChild(addRow);
  card.appendChild(el(`<div class="legend">${BOOKS.map(b=>`<div class="legend-item"><span class="swatch" style="background:${b.bg};border:1.5px solid ${b.border}"></span>${b.name}</div>`).join("")}</div>`));
  card.appendChild(el(`<div style="padding:0 16px 14px;font-size:12px;color:var(--text3)">학생 이름을 클릭하면 수업 기록과 추천 자료를 볼 수 있어요 · 단원 칸에 현재 단원을 입력하면 추천 자료에 표시됩니다</div>`));
  return card;
}

  const card = el(`<div class="card"></div>`);
  const body = el(`<div style="padding:16px"></div>`);
  const back = el(`<button class="btn back-btn">← 학생 목록</button>`);
  back.onclick = () => { state.studentDetail = null; render(); };
  body.appendChild(back);

  // 학생 헤더 (교재 + 단원)
  const unitLabel = stu.unit ? ` · ${stu.unit}` : "";
  body.appendChild(el(`<div class="meta-row"><span class="chip" style="background:${c.bg};color:${c.text};font-size:14px;padding:4px 14px">${name}</span><span style="font-size:12px;color:var(--text3)">${bookById(studentBook(name)).name}${unitLabel} · 총 ${all.length}회 기록</span></div>`));

  // ── 추천 자료 섹션 ──────────────────────────────────────────────────────────
  const bookId = studentBook(name);
  const relTags = BOOK_RES_TAGS[bookId] || [];

  // 1) GitHub/RESOURCES에서 관련 태그 자료 필터링
  const baseList = Array.isArray(state.resources) ? state.resources : RESOURCES.slice();
  const matchedRes = relTags.length > 0
    ? baseList.filter(r => {
        const t = resTagsOf(r.file);
        return relTags.some(rt => t.includes(rt));
      })
    : [];

  // 2) 노션 공통 문법 자료 (교재 무관, 항상 표시)
  const notionRes = NOTION_GRAMMAR;

  // 3) 외부 웹 도구 (게임 등, 항상 표시)
  const extTools = EXTERNAL_TOOLS;

  const totalCount = matchedRes.length + notionRes.length + extTools.length;
  const recSection = el(`<div class="rec-section"></div>`);
  const secHead = el(`<div class="rec-section-head"><span class="sec-title">📚 추천 자료</span><span class="sec-badge">${bookById(bookId).name}${unitLabel} · ${totalCount}개</span></div>`);
  const secBody = el(`<div class="rec-section-body"></div>`);
  let secOpen = true;
  secHead.onclick = () => { secOpen = !secOpen; secBody.style.display = secOpen ? "" : "none"; secHead.querySelector(".sec-badge").textContent = (secOpen ? "" : "▶ ") + `${bookById(bookId).name}${unitLabel} · ${totalCount}개`; };
  recSection.appendChild(secHead);

  if (totalCount === 0) {
    secBody.appendChild(el(`<div style="font-size:13px;color:var(--text3);padding:8px 0">교재를 지정하면 관련 자료가 자동으로 표시됩니다</div>`));
  } else {
    // GitHub/RESOURCES 자료
    if (matchedRes.length > 0) {
      secBody.appendChild(el(`<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;margin-top:2px">수업 자료 라이브러리 (${matchedRes.length}개)</div>`));
      matchedRes.forEach(r => {
        const tags = resTagsOf(r.file);
        const row = el(`<div class="rec-res-row"></div>`);
        const left = el(`<div style="flex:1;min-width:0"></div>`);
        left.appendChild(el(`<span class="rec-res-name">${r.name}</span>`));
        if (tags.length) {
          const tagWrap = el(`<div class="rec-res-tags" style="margin-top:3px"></div>`);
          tags.forEach(t => tagWrap.appendChild(el(`<span class="rec-res-tag">${t}</span>`)));
          left.appendChild(tagWrap);
        }
        row.appendChild(left);
        row.appendChild(el(`<a href="${RES_BASE}${r.file}" target="_blank" rel="noopener" class="btn" style="text-decoration:none;flex-shrink:0;font-size:12px;padding:4px 9px">열기 ↗</a>`));
        secBody.appendChild(row);
      });
    }

    // 노션 공통 문법 자료
    secBody.appendChild(el(`<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;margin-top:${matchedRes.length>0?'12px':'2px'}">노션 문법 자료 (공통 · ${notionRes.length}개)</div>`));
    notionRes.forEach(r => {
      const row = el(`<div class="rec-res-row"></div>`);
      const left = el(`<div style="flex:1;min-width:0"></div>`);
      left.appendChild(el(`<span class="rec-res-name">${r.name}</span>`));
      if (r.tags && r.tags.length) {
        const tagWrap = el(`<div class="rec-res-tags" style="margin-top:3px"></div>`);
        r.tags.forEach(t => tagWrap.appendChild(el(`<span class="rec-res-tag">${t}</span>`)));
        tagWrap.appendChild(el(`<span class="notion-badge">Notion</span>`));
        left.appendChild(tagWrap);
      }
      row.appendChild(left);
      row.appendChild(el(`<a href="${r.url}" target="_blank" rel="noopener" class="btn" style="text-decoration:none;flex-shrink:0;font-size:12px;padding:4px 9px">열기 ↗</a>`));
      secBody.appendChild(row);
    });

    // 외부 웹 도구 (밸런스 게임 등)
    secBody.appendChild(el(`<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;margin-top:12px">웹 도구 · 활동 앱 (공통 · ${extTools.length}개)</div>`));
    extTools.forEach(r => {
      const row = el(`<div class="rec-res-row"></div>`);
      const left = el(`<div style="flex:1;min-width:0"></div>`);
      left.appendChild(el(`<span class="rec-res-name">${r.name}</span>`));
      const tagWrap = el(`<div class="rec-res-tags" style="margin-top:3px"></div>`);
      if (r.tags) r.tags.forEach(t => tagWrap.appendChild(el(`<span class="rec-res-tag">${t}</span>`)));
      if (r.desc) tagWrap.appendChild(el(`<span style="font-size:10px;color:var(--text3);margin-left:2px">${r.desc}</span>`));
      left.appendChild(tagWrap);
      row.appendChild(left);
      row.appendChild(el(`<a href="${r.url}" target="_blank" rel="noopener" class="btn" style="text-decoration:none;flex-shrink:0;font-size:12px;padding:4px 9px">열기 ↗</a>`));
      secBody.appendChild(row);
    });
  }

  recSection.appendChild(secBody);
  body.appendChild(recSection);
  // ── 추천 자료 섹션 끝 ────────────────────────────────────────────────────────

  // 수업 기록 세그먼트
  const seg = el(`<div class="seg" style="margin-bottom:14px"><button class="${state.detailMode==='all'?'on':''}" data-m="all">전체 기록</button><button class="${state.detailMode==='hard'?'on':''}" data-m="hard">어려워한 점만</button></div>`);
  seg.querySelectorAll("button").forEach(b => b.onclick = () => { state.detailMode = b.dataset.m; render(); });
  body.appendChild(seg);

  if (all.length === 0) {
    body.appendChild(el(`<div class="hint">아직 기록이 없어요</div>`));
  } else if (state.detailMode === "hard") {
    const hards = all.filter(l => l.hard && l.hard.trim());
    if (hards.length === 0) body.appendChild(el(`<div class="hint">기록된 "어려워한 점"이 없어요</div>`));
    else hards.forEach(l => {
      const rec = el(`<div class="rec" style="border-left-color:${bookById(studentBook(name)).border}"></div>`);
      rec.appendChild(el(`<div class="rec-date"><span>${fmtDate(l.date)}</span></div>`));
      rec.appendChild(el(`<div class="rec-line"><div>${l.hard}</div></div>`));
      const th = tagsHtml(l.tags); if (th) rec.appendChild(el(th));
      body.appendChild(rec);
    });
  } else {
    all.forEach(l => body.appendChild(recCard(l, false)));
  }
  card.appendChild(body);
  return card;
}

// ─── 복습 모아보기 ────────────────────────────────────────────────────────────
function renderReview() {
  const card = el(`<div class="card"></div>`);
  const filter = el(`<div class="filterbar"><span style="font-size:12px;font-weight:600;color:var(--text2)">태그 필터:</span></div>`);
  const allBtn = el(`<button class="tagbtn ${state.reviewTag===null?'on':''}">전체</button>`);
  allBtn.onclick = () => { state.reviewTag = null; render(); };
  filter.appendChild(allBtn);
  TAGS.forEach(t => {
    const tb = el(`<button class="tagbtn ${state.reviewTag===t?'on':''}">${t}</button>`);
    tb.onclick = () => { state.reviewTag = t; render(); };
    filter.appendChild(tb);
  });
  card.appendChild(filter);

  const body = el(`<div style="padding:16px"></div>`);
  let recs = state.lessons.filter(l => isPast(l.date) && l.hard && l.hard.trim());
  if (state.reviewTag) recs = recs.filter(l => (l.tags||[]).includes(state.reviewTag));
  recs.sort((a,b) => b.date.localeCompare(a.date));

  body.appendChild(el(`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${state.reviewTag?`"${state.reviewTag}" 태그가 달린 `:""}어려워한 점 모아보기 — 전체 학생 (${recs.length}건)</div>`));
  if (recs.length === 0) body.appendChild(el(`<div class="hint">해당하는 기록이 없어요</div>`));
  else recs.forEach(l => body.appendChild(recCard(l, true)));
  card.appendChild(body);
  return card;
}

// ─── 자료 라이브러리 ──────────────────────────────────────────────────────────
function renderLibrary() {
  const card = el(`<div class="card"></div>`);

  const filter = el(`<div class="filterbar"><span style="font-size:12px;font-weight:600;color:var(--text2)">태그 필터:</span></div>`);
  const allBtn = el(`<button class="tagbtn ${state.resFilter===null?'on':''}">전체</button>`);
  allBtn.onclick = () => { state.resFilter = null; render(); };
  filter.appendChild(allBtn);
  RES_TAGS.forEach(t => {
    const tb = el(`<button class="tagbtn ${state.resFilter===t?'on':''}">${t}</button>`);
    tb.onclick = () => { state.resFilter = t; render(); };
    filter.appendChild(tb);
  });
  card.appendChild(filter);

  const body = el(`<div style="padding:12px 16px"></div>`);

  if (state.resources === null) {
    body.appendChild(el(`<div class="hint">자료 목록을 불러오는 중입니다…</div>`));
    card.appendChild(body);
    return card;
  }

  const baseList = Array.isArray(state.resources) ? state.resources : RESOURCES.slice();
  const isFallback = state.resources === false;
  if (isFallback) {
    body.appendChild(el(`<div style="font-size:11px;color:var(--text3);margin-bottom:10px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius)">⚠️ GitHub 연결 실패 — 저장된 목록을 표시합니다. <button id="res-retry" class="btn" style="padding:2px 8px;font-size:11px">다시 시도</button></div>`));
    body.querySelector('#res-retry').onclick = () => { state.resources = null; render(); loadResourcesFromGitHub(); };
  }

  let list = baseList.slice();
  if (state.resFilter) list = list.filter(r => resTagsOf(r.file).includes(state.resFilter));

  const srcLabel = isFallback ? ' (저장된 목록)' : ' (GitHub 연동)';
  body.appendChild(el(`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${state.resFilter?`"${state.resFilter}" `:""}자료 ${list.length}개${srcLabel}</div>`));

  list.forEach(r => {
    const tags = resTagsOf(r.file);
    const row = el(`<div class="rec" style="border-left-color:var(--accent);display:flex;justify-content:space-between;align-items:center;gap:10px"></div>`);
    const left = el(`<div style="min-width:0;flex:1"></div>`);
    left.appendChild(el(`<div style="font-weight:500;margin-bottom:5px">${r.name}</div>`));
    const tagWrap = el(`<div class="tag-row"></div>`);
    RES_TAGS.forEach(t => {
      const on = tags.includes(t);
      const tb = el(`<button class="tagbtn ${on?'on':''}" style="padding:2px 9px;font-size:11px">${t}</button>`);
      tb.onclick = () => {
        let cur = resTagsOf(r.file).slice();
        if (cur.includes(t)) cur = cur.filter(x=>x!==t); else cur.push(t);
        state.resTags[r.file] = cur; saveResTags(); render();
      };
      tagWrap.appendChild(tb);
    });
    left.appendChild(tagWrap);
    row.appendChild(left);
    row.appendChild(el(`<a href="${RES_BASE}${r.file}" target="_blank" rel="noopener" class="btn" style="text-decoration:none;flex-shrink:0">열기 ↗</a>`));
    body.appendChild(row);
  });

  // 외부 웹 도구 (밸런스 게임 등) — 태그 필터가 '게임' 이거나 전체일 때 표시
  const extFiltered = state.resFilter
    ? EXTERNAL_TOOLS.filter(r => r.tags.includes(state.resFilter))
    : EXTERNAL_TOOLS;
  if (extFiltered.length > 0) {
    body.appendChild(el(`<div style="font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 8px">웹 도구 · 활동 앱 (${extFiltered.length}개)</div>`));
    extFiltered.forEach(r => {
      const row = el(`<div class="rec" style="border-left-color:#f0a030;display:flex;justify-content:space-between;align-items:center;gap:10px"></div>`);
      const left = el(`<div style="min-width:0;flex:1"></div>`);
      left.appendChild(el(`<div style="font-weight:500;margin-bottom:4px">${r.name}</div>`));
      const tagWrap = el(`<div class="tag-row"></div>`);
      r.tags.forEach(t => tagWrap.appendChild(el(`<span class="tag-static">${t}</span>`)));
      if (r.desc) tagWrap.appendChild(el(`<span style="font-size:11px;color:var(--text3)">${r.desc}</span>`));
      left.appendChild(tagWrap);
      row.appendChild(left);
      row.appendChild(el(`<a href="${r.url}" target="_blank" rel="noopener" class="btn" style="text-decoration:none;flex-shrink:0">열기 ↗</a>`));
      body.appendChild(row);
    });
  }

  card.appendChild(body);
  return card;
}

function openNew(date)  { state.panel = { type: "new", date }; render(); }
function openLesson(l)  { state.panel = { type: "lesson", id: l.id }; render(); }
function closePanel()   { state.panel = null; render(); }

// 앱 초기화
render();
loadResourcesFromGitHub();
</script>
</body>
</html>
